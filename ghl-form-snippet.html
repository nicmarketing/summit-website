  SUMMIT MARKETING — GoHighLevel Custom HTML Form Wrapper
  ============================================================
  HOW TO USE IN GHL:
  1. GoHighLevel → Sites → Forms → open Summit Formfill
  2. Add Element → "Custom HTML" block
  3. Paste everything between the ==== lines below
  4. In GHL's form builder, HIDE or REMOVE the default form
     header (title/subtitle) so it doesn't duplicate ours
  5. Save and publish
  ============================================================

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  .sm-wrap * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

  .sm-wrap {
    font-family: 'Inter', Arial, sans-serif;
    background: linear-gradient(160deg, #0b2255 0%, #071940 55%, #020c1f 100%);
    border: 1px solid rgba(0,174,239,.3);
    border-radius: 20px;
    padding: 48px 44px 32px;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    box-shadow: 0 0 80px rgba(0,174,239,.12), 0 40px 80px rgba(0,0,0,.4);
    position: relative;
    overflow: hidden;
  }

  .sm-wrap::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,174,239,.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .sm-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #00AEEF;
    margin-bottom: 10px;
  }

  .sm-title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.03em;
    line-height: 1.15;
    color: #ffffff;
    margin-bottom: 8px;
  }

  .sm-title span {
    background: linear-gradient(135deg, #00AEEF, #41D9F2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sm-sub {
    font-size: 14px;
    color: rgba(255,255,255,.5);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .sm-divider {
    height: 1px;
    background: linear-gradient(90deg, rgba(0,174,239,.4), rgba(65,217,242,.2), transparent);
    margin-bottom: 0;
  }

  .sm-iframe-wrap {
    margin: 0 -44px;
  }

  .sm-iframe-wrap iframe {
    width: 100%;
    border: none;
    display: block;
  }

  @media (max-width: 520px) {
    .sm-wrap  { padding: 32px 22px 20px; }
    .sm-title { font-size: 22px; }
    .sm-iframe-wrap { margin: 0 -22px; }
  }
</style>

<div class="sm-wrap">
  <div class="sm-eyebrow">Free Strategy Call</div>
  <h2 class="sm-title">Let's reach <span>new heights</span> together</h2>
  <p class="sm-sub">Tell us about your business and goals. We'll review your current marketing and show you exactly what's possible.</p>
  <div class="sm-divider"></div>

  <div class="sm-iframe-wrap">
    <iframe
      src="https://go.summitmarketingms.com/widget/form/MJTRLtD3XMg6oENJswpM"
      style="width:100%;height:100%;border:none;border-radius:4px"
      id="inline-MJTRLtD3XMg6oENJswpM"
      data-layout="{'id':'INLINE'}"
      data-trigger-type="alwaysShow"
      data-trigger-value=""
      data-activation-type="alwaysActivated"
      data-activation-value=""
      data-deactivation-type="neverDeactivate"
      data-deactivation-value=""
      data-form-name="Summit Formfill"
      data-height="1162"
      data-layout-iframe-id="inline-MJTRLtD3XMg6oENJswpM"
      data-form-id="MJTRLtD3XMg6oENJswpM"
      title="Summit Formfill"
    ></iframe>
  </div>
</div>
