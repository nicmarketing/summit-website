<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020c1f"/>
      <stop offset="100%" style="stop-color:#002060"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00AEEF"/>
      <stop offset="100%" style="stop-color:#41D9F2"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#41D9F2;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#002060;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00AEEF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#020c1f;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Mountain silhouettes -->
  <polygon points="900,630 1060,320 1200,480 1200,630" fill="url(#mountain2)"/>
  <polygon points="800,630 1000,240 1100,380 1200,300 1200,630" fill="url(#mountain1)"/>
  <polygon points="650,630 900,180 1050,340 1200,250 1200,630" fill="rgba(0,174,239,0.08)"/>

  <!-- Peak shimmer -->
  <ellipse cx="900" cy="180" rx="18" ry="5" fill="#41D9F2" opacity="0.6"/>

  <!-- Accent bar -->
  <rect x="80" y="260" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Main headline -->
  <text x="80" y="220" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="-2">Summit Marketing</text>

  <!-- Tagline -->
  <text x="80" y="310" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.65)" letter-spacing="0.5">Reaching New Heights Together</text>

  <!-- Sub-descriptor -->
  <text x="80" y="390" font-family="Arial, sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.45)">Mississippi's Results-Driven Digital Marketing Agency</text>

  <!-- URL badge -->
  <rect x="80" y="440" width="310" height="48" rx="24" fill="rgba(0,174,239,0.15)" stroke="#00AEEF" stroke-width="1.5"/>
  <text x="235" y="471" font-family="Arial, sans-serif" font-size="18" fill="#00AEEF" text-anchor="middle" letter-spacing="0.5">summitmarketingms.com</text>
</svg>
